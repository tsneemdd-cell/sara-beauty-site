<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحجز - Sara Beauty</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">Sara Beauty</div>
        <ul id="navMenu">
          <li><a href="home.html">الرئيسية</a></li>
          <li><a href="products.html">المنتجات</a></li>
          <li><a href="services.html">الخدمات</a></li>
          <li><a href="about.html">من نحن</a></li>
          <li><a href="booking.html" class="active">الحجز</a></li>
          <li><a href="index.html">تسجيل الخروج</a></li>
        </ul>
        <div class="menu-btn">☰</div>
      </nav>
    </div>
  </header>

  <section class="container">
    <h1 style="text-align:center; margin-bottom:20px;">احجزي موعدك</h1>
    <p style="text-align:center; margin-bottom:30px;">املي البيانات وحنتصل بيك لتأكيد الحجز 💌</p>
    <form id="bookingForm" style="max-width:600px; margin:auto; background:var(--white); padding:30px; border-radius:20px;">
      <div style="margin-bottom:15px;"><label>الاسم الكامل</label><input type="text" required></div>
      <div style="margin-bottom:15px;"><label>رقم الواتساب</label><input type="tel" required></div>
      <div style="margin-bottom:15px;">
        <label>الخدمة المطلوبة</label>
        <select required>
          <option>جلسة فيشل</option><option>ميكب</option><option>رسم حنة</option>
          <option>استشارة تساقط شعر</option><option>استشارة حب شباب</option><option>شراء تركيبة</option>
        </select>
      </div>
      <div style="margin-bottom:15px;"><label>التاريخ والوقت</label><input type="datetime-local" required></div>
      <div style="margin-bottom:15px;"><label>ملاحظات</label><textarea rows="4"></textarea></div>
      <button type="submit" class="btn" style="width:100%;">إرسال طلب الحجز</button>
    </form>
  </section>
  <footer><p>© 2026 Sara Beauty</p></footer>
  <script src="script.js"></script>
</body>
</html>
