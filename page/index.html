<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Sara Beauty</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">Sara Beauty</div>
      </nav>
    </div>
  </header>

  <section class="container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
    <div style="background:var(--white); padding:40px; border-radius:20px; width:100%; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.05);">
      <h2 style="text-align:center; margin-bottom:25px; color:var(--sage);">مرحباً بك في Sara Beauty</h2>
      <form action="home.html">
        <div style="margin-bottom:15px;"><label>البريد الإلكتروني</label><input type="email" required placeholder="example@email.com"></div>
        <div style="margin-bottom:20px;"><label>كلمة المرور</label><input type="password" required placeholder="********"></div>
        <button type="submit" class="btn" style="width:100%;">دخول</button>
        <p style="text-align:center; margin-top:15px; font-size:14px;">ليس لديك حساب؟ <a href="#" style="color:var(--sage);">إنشاء حساب</a></p>
      </form>
    </div>
  </section>

  <footer><p>© 2026 Sara Beauty. جميع الحقوق محفوظة</p></footer>
</body>
</html>
