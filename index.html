<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Sara Beauty</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="display:flex; align-items:center; justify-content:center; min-height:90vh;">
    <form onsubmit="login(event)">
      <h2 style="text-align:center; color:#D48C7B; margin-bottom:20px;">مرحباً بعودتك</h2>
      <img src="img/about.jpg" style="width:100%; border-radius:15px; margin-bottom:20px;">
      <input type="email" placeholder="البريد الإلكتروني" required>
      <input type="password" placeholder="كلمة السر" required>
      <button class="btn" style="width:100%;">تسجيل الدخول</button>
      <p style="text-align:center; margin-top:15px;">ليس لديك حساب؟ <a href="signup.html" style="color:#D48C7B;">سجلي الآن</a></p>
    </form>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
